<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GLL Run Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0e0e0e; color: #f0f0f0; min-height: 100vh; }
  .wrap { padding: 1.5rem 1rem 2.5rem; max-width: 440px; margin: 0 auto; text-align: center; }

  .header-title { font-size: 15px; font-weight: 500; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.5rem; }

  .audio-banner { display: flex; align-items: center; gap: 8px; background: #2a2200; border: 1px solid #6b4f00; color: #f0b429; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 1.25rem; cursor: pointer; text-align: left; }
  .audio-banner.hidden { display: none; }

  .status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 16px; border-radius: 20px; margin-bottom: 1rem; }
  .pill-stopped { background: #1c1c1c; color: #666; border: 1px solid #333; }
  .pill-running { background: #0a2e1a; color: #3ecf8e; border: 1px solid #1a5c3a; }
  .pill-alert  { background: #2e1a0a; color: #f0943e; border: 1px solid #5c3a1a; }
  .pill-done   { background: #2e0a0a; color: #e05c5c; border: 1px solid #5c1a1a; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .dot.pulse { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .time-display { font-size: 88px; font-weight: 600; letter-spacing: -4px; color: #f0f0f0; line-height: 1; margin-bottom: 0.5rem; font-variant-numeric: tabular-nums; transition: color 0.3s; }
  .time-display.muted { color: #444; }
  .time-display.warn { color: #f0943e; }
  .time-display.danger { color: #e05c5c; animation: flash 0.6s infinite; }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .alert-message { display: none; margin: 0.75rem auto 1rem; max-width: 320px; background: #2e1a0a; border: 1px solid #5c3a1a; border-radius: 10px; padding: 12px 16px; }
  .alert-message.visible { display: block; }
  .alert-message .alert-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #f0943e; margin-bottom: 4px; }
  .alert-message .alert-text { font-size: 15px; font-weight: 500; color: #f5d7b5; line-height: 1.4; }

  .milestone-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .milestone { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .m-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
  .m-badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: #1c1c1c; color: #555; border: 1px solid #2a2a2a; transition: all 0.3s; }
  .m-badge.upcoming { background: #1a2e20; color: #3ecf8e; border-color: #2a5c3a; }
  .m-badge.fired { background: #1c1c1c; color: #3a3a3a; border-color: #2a2a2a; text-decoration: line-through; }
  .m-badge.firing { background: #2e1a0a; color: #f0943e; border-color: #5c3a1a; animation: flash 0.6s infinite; }

  .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 12px 22px; border-radius: 10px; border: 1px solid #333; background: #1c1c1c; color: #f0f0f0; font-size: 15px; cursor: pointer; font-family: inherit; touch-action: manipulation; }
  .btn:active { transform: scale(0.97); }
  .btn-green { background: #0a2e1a; border-color: #1a5c3a; color: #3ecf8e; }
  .btn-orange { background: #2e1a0a; border-color: #5c3a1a; color: #f0943e; }

  .divider { height: 1px; background: #222; margin: 1.25rem 0; }
  .section-label { font-size: 12px; color: #555; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }

  .duration-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
  .pill-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #333; background: #1c1c1c; color: #aaa; font-size: 13px; cursor: pointer; font-family: inherit; touch-action: manipulation; }
  .pill-btn.active { border-color: #3ecf8e; color: #3ecf8e; background: #0a2e1a; }
  .pill-btn:active { transform: scale(0.97); }

  .custom-row { display: flex; gap: 8px; justify-content: center; align-items: center; margin-top: 8px; }
  .custom-row input { width: 72px; text-align: center; font-size: 15px; padding: 7px; border: 1px solid #333; border-radius: 8px; font-family: inherit; background: #1c1c1c; color: #f0f0f0; }

  .sound-section { margin-top: 1.25rem; }
  .toggle-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .toggle { position: relative; width: 42px; height: 24px; cursor: pointer; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider-track { position: absolute; inset: 0; background: #333; border-radius: 12px; transition: background 0.2s; }
  .toggle input:checked + .slider-track { background: #1D9E75; }
  .slider-thumb { position: absolute; width: 18px; height: 18px; background: #f0f0f0; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
  .toggle input:checked + .slider-track .slider-thumb { transform: translateX(18px); }
  .sound-opts { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .sound-opt { padding: 6px 14px; border-radius: 20px; border: 1px solid #333; background: #1c1c1c; color: #666; font-size: 13px; cursor: pointer; font-family: inherit; touch-action: manipulation; }
  .sound-opt.selected { border-color: #3ecf8e; color: #3ecf8e; background: #0a2e1a; }

  .sync-note { font-size: 12px; color: #444; margin-top: 1.5rem; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header-title">GLL Run Timer</div>

  <div class="audio-banner" id="audioBanner" onclick="unlockAudio()">
    🔔 Tap here first to enable alarm on this device
  </div>

  <div id="pill" class="status-pill pill-stopped">
    <div class="dot" id="dot"></div>
    <span id="pillText">Ready</span>
  </div>

  <div class="time-display muted" id="display">45:00</div>

  <div class="alert-message" id="alertMsg">
    <div class="alert-label" id="alertLabel">10 min remaining</div>
    <div class="alert-text" id="alertText"></div>
  </div>

  <div class="milestone-row">
    <div class="milestone">
      <div class="m-label">Alert</div>
      <div class="m-badge upcoming" id="m15">15 min</div>
    </div>
    <div class="milestone">
      <div class="m-label">Alert</div>
      <div class="m-badge upcoming" id="m10">10 min</div>
    </div>
    <div class="milestone">
      <div class="m-label">Alert</div>
      <div class="m-badge upcoming" id="m5">5 min</div>
    </div>
    <div class="milestone">
      <div class="m-label">End</div>
      <div class="m-badge upcoming" id="m0">Time's up</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-green" id="startBtn" onclick="handleStart()">▶ Start</button>
    <button class="btn" id="pauseBtn" onclick="handlePause()" style="display:none">⏸ Pause</button>
    <button class="btn" onclick="handleReset()">↺ Reset</button>
    <button class="btn btn-orange" id="dismissBtn" onclick="handleDismiss()" style="display:none">🔕 Dismiss</button>
  </div>

  <div class="divider"></div>
  <div class="section-label">Session duration</div>
  <div class="duration-row">
    <button class="pill-btn active" id="dur-45" onclick="setDuration(2700, this)">45 min</button>
    <button class="pill-btn" id="dur-custom" onclick="toggleCustom(this)">Custom</button>
  </div>
  <div class="custom-row" id="customRow" style="display:none">
    <input type="number" id="customMin" min="1" max="99" placeholder="minutes" />
    <button class="pill-btn" onclick="setCustom()">Set</button>
  </div>

  <div class="sound-section">
    <div class="divider"></div>
    <div class="section-label">Alarm sound</div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="alarmToggle" checked onchange="onAlarmToggle()">
        <div class="slider-track"><div class="slider-thumb"></div></div>
      </label>
      <span style="font-size:14px; color:#aaa" id="alarmLabel">Alarm on</span>
    </div>
    <div class="sound-opts" id="soundOpts">
      <button class="sound-opt selected" id="opt-beep" onclick="selectSound('beep')">Beep</button>
      <button class="sound-opt" id="opt-horn" onclick="selectSound('horn')">Air horn</button>
      <button class="sound-opt" id="opt-buzz" onclick="selectSound('buzz')">Buzz</button>
    </div>
  </div>

  <p class="sync-note">Syncs every 2s — share this page URL with your group.<br>Each person taps the banner once to enable sound.</p>
</div>

<script>
const STORAGE_KEY = 'gll_timer_v3';
const MILESTONES = [900, 600, 300];

const MILESTONE_MESSAGES = {
  900: { label: '15 min remaining', text: '' },
  600: { label: '10 min remaining', text: 'Next flagger, walk the LAST RUN sign down the grid' },
  300: { label: '5 min remaining', text: '' }
};

let audioCtx = null;
let audioUnlocked = false;
let cachedState = null;
let localTick = null;
let alarmPlaying = false;
let alarmInterval = null;
let selectedSound = 'beep';
let alarmEnabled = true;
let activeDurBtn = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function unlockAudio() {
  try {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    audioUnlocked = true;
    document.getElementById('audioBanner').classList.add('hidden');
  } catch(e) {}
}

function selectSound(name) {
  selectedSound = name;
  ['beep','horn','buzz'].forEach(n => document.getElementById('opt-'+n).classList.toggle('selected', n===name));
}

function onAlarmToggle() {
  alarmEnabled = document.getElementById('alarmToggle').checked;
  document.getElementById('alarmLabel').textContent = alarmEnabled ? 'Alarm on' : 'Alarm off';
  document.getElementById('soundOpts').style.opacity = alarmEnabled ? '1' : '0.4';
}

function playTone(isMilestone) {
  if (!audioUnlocked) return;
  try {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    if (selectedSound === 'horn') {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(320, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(180, ctx.currentTime + 0.6);
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.9);
    } else if (selectedSound === 'buzz') {
      [0, 0.25, 0.5].forEach(t => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.value = 140;
        gain.gain.setValueAtTime(0.35, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.22);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.25);
      });
    } else {
      const notes = isMilestone ? [880, 880, 1100] : [1320, 1100, 880];
      [0, 0.2, 0.4].forEach((t, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = notes[i];
        gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.35);
      });
    }
  } catch(e) {}
}

function startAlarm(isMilestone) {
  if (!alarmEnabled || !audioUnlocked) return;
  stopAlarm();
  alarmPlaying = true;
  playTone(isMilestone);
  let count = 0;
  const max = isMilestone ? 3 : 999;
  alarmInterval = setInterval(() => {
    if (!alarmPlaying) { clearInterval(alarmInterval); return; }
    if (++count >= max) { stopAlarm(); return; }
    playTone(isMilestone);
  }, 1200);
}

function stopAlarm() {
  alarmPlaying = false;
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
}

function fmt(secs) {
  const s = Math.max(0, Math.round(secs));
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function remaining(s) {
  if (!s) return 0;
  if (s.running && s.startedAt) return Math.max(0, s.remainingAtStart - (Date.now() - s.startedAt) / 1000);
  return s.remainingAtStart || 0;
}

function showAlertMessage(milestoneKey) {
  const msg = MILESTONE_MESSAGES[milestoneKey];
  const box = document.getElementById('alertMsg');
  if (msg && msg.text) {
    document.getElementById('alertLabel').textContent = msg.label;
    document.getElementById('alertText').textContent = msg.text;
    box.classList.add('visible');
  } else if (msg && !msg.text) {
    box.classList.remove('visible');
  }
}

function hideAlertMessage() {
  document.getElementById('alertMsg').classList.remove('visible');
}

function updateMilestoneBadges(rem, fired) {
  const defs = [{id:'m15',secs:900},{id:'m10',secs:600},{id:'m5',secs:300},{id:'m0',secs:0}];
  defs.forEach(({id, secs}) => {
    const el = document.getElementById(id);
    const isFired = fired.includes(secs) || (secs === 0 && rem <= 0);
    el.className = 'm-badge' + (isFired ? ' fired' : ' upcoming');
  });
}

function render(s) {
  const disp = document.getElementById('display');
  const pill = document.getElementById('pill');
  const dot = document.getElementById('dot');
  const pillText = document.getElementById('pillText');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const dismissBtn = document.getElementById('dismissBtn');
  const rem = remaining(s);
  const fired = s.firedMilestones || [];

  disp.textContent = fmt(rem);
  updateMilestoneBadges(rem, fired);

  if (s.alarming) {
    disp.className = 'time-display danger';
    pill.className = 'status-pill pill-done';
    dot.classList.add('pulse');
    pillText.textContent = "Time's up!";
    startBtn.style.display = 'none';
    pauseBtn.style.display = 'none';
    dismissBtn.style.display = 'inline-flex';
    hideAlertMessage();
    if (!alarmPlaying) startAlarm(false);
  } else if (s.running && rem > 0) {
    disp.className = rem <= 300 ? 'time-display warn' : 'time-display';
    pill.className = rem <= 300 ? 'status-pill pill-alert' : 'status-pill pill-running';
    dot.classList.add('pulse');
    pillText.textContent = rem <= 300 ? '5 min left' : rem <= 600 ? '10 min left' : 'Running';
    startBtn.style.display = 'none';
    pauseBtn.style.display = 'inline-flex';
    dismissBtn.style.display = 'none';
    if (alarmPlaying && !s.alarming) stopAlarm();
    // Show 10-min message while in that window
    if (fired.includes(600) && !fired.includes(300)) {
      showAlertMessage(600);
    } else if (!fired.includes(600)) {
      hideAlertMessage();
    } else {
      hideAlertMessage();
    }
  } else {
    disp.className = 'time-display muted';
    pill.className = 'status-pill pill-stopped';
    dot.classList.remove('pulse');
    pillText.textContent = rem > 0 ? 'Paused' : rem === 0 && s.totalSeconds > 0 ? 'Done' : 'Ready';
    startBtn.style.display = 'inline-flex';
    pauseBtn.style.display = 'none';
    dismissBtn.style.display = 'none';
    stopAlarm();
  }
}

async function load() {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}

async function save(s) {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(s), true); } catch {}
}

async function sync() {
  let s = await load();
  if (!s) s = { running:false, remainingAtStart:2700, totalSeconds:2700, startedAt:null, alarming:false, firedMilestones:[] };
  if (!s.firedMilestones) s.firedMilestones = [];
  if (s.running && !s.alarming) {
    const rem = remaining(s);
    MILESTONES.forEach(m => {
      if (rem <= m && !s.firedMilestones.includes(m)) {
        s.firedMilestones.push(m);
        save(s);
        startAlarm(true);
      }
    });
    if (rem <= 0) { s.running = false; s.remainingAtStart = 0; s.alarming = true; await save(s); }
  }
  cachedState = s;
  render(s);
}

function startTick() {
  if (localTick) return;
  localTick = setInterval(() => {
    if (!cachedState?.running) return;
    const rem = remaining(cachedState);
    MILESTONES.forEach(m => {
      if (rem <= m && !cachedState.firedMilestones.includes(m)) {
        cachedState.firedMilestones.push(m);
        save(cachedState);
        startAlarm(true);
      }
    });
    render(cachedState);
  }, 250);
}

async function handleStart() {
  const s = cachedState || { running:false, remainingAtStart:2700, totalSeconds:2700, startedAt:null, alarming:false, firedMilestones:[] };
  if (!s.firedMilestones) s.firedMilestones = [];
  if (s.remainingAtStart <= 0) s.remainingAtStart = s.totalSeconds || 2700;
  if (s.remainingAtStart === s.totalSeconds) s.firedMilestones = [];
  s.running = true; s.alarming = false; s.startedAt = Date.now();
  cachedState = s; await save(s); render(s); startTick();
}

async function handlePause() {
  if (!cachedState) return;
  cachedState.remainingAtStart = remaining(cachedState);
  cachedState.running = false; cachedState.startedAt = null;
  await save(cachedState); render(cachedState);
}

async function handleReset() {
  stopAlarm(); hideAlertMessage();
  const total = cachedState?.totalSeconds || 2700;
  cachedState = { running:false, remainingAtStart:total, totalSeconds:total, startedAt:null, alarming:false, firedMilestones:[] };
  await save(cachedState); render(cachedState);
}

async function handleDismiss() {
  stopAlarm(); hideAlertMessage();
  if (!cachedState) return;
  cachedState.alarming = false; cachedState.remainingAtStart = cachedState.totalSeconds; cachedState.firedMilestones = [];
  await save(cachedState); render(cachedState);
}

function setDuration(secs, btn) {
  if (activeDurBtn) activeDurBtn.classList.remove('active');
  if (btn) { btn.classList.add('active'); activeDurBtn = btn; }
  document.getElementById('customRow').style.display = 'none';
  cachedState = { running:false, remainingAtStart:secs, totalSeconds:secs, startedAt:null, alarming:false, firedMilestones:[] };
  save(cachedState); render(cachedState);
}

function toggleCustom(btn) {
  if (activeDurBtn) activeDurBtn.classList.remove('active');
  btn.classList.add('active'); activeDurBtn = btn;
  document.getElementById('customRow').style.display = 'flex';
}

function setCustom() {
  const m = parseInt(document.getElementById('customMin').value) || 0;
  if (!m) return;
  document.getElementById('customMin').value = '';
  const total = m * 60;
  cachedState = { running:false, remainingAtStart:total, totalSeconds:total, startedAt:null, alarming:false, firedMilestones:[] };
  save(cachedState); render(cachedState);
}

activeDurBtn = document.getElementById('dur-45');
sync();
startTick();
setInterval(sync, 2000);
</script>
</body>
</html>
